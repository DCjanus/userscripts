minimum_prek_version = "0.4.8"

[[repos]]
repo = "builtin"
hooks = [
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "userscript-version"
name = "userscript-version"
language = "node"
entry = "node tools/userscript-version.mjs"
files = "^scripts/.*\\.user\\.js$"

[[repos.hooks]]
id = "userscript-version-tests"
name = "userscript-version-tests"
language = "node"
entry = "node --test tests/userscript-version.test.mjs"
pass_filenames = false
files = "^(tools/userscript-version\\.mjs|tests/userscript-version\\.test\\.mjs)$"

[[repos.hooks]]
id = "biome"
name = "biome"
language = "node"
entry = "biome check"
additional_dependencies = ["@biomejs/biome@latest"]
files = "^(scripts/.*\\.user\\.js|biome\\.json)$"
